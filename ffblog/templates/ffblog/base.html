<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpremBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        .navbar-brand {
            font-family: 'Merriweather', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff !important;
        }
        .navbar {
            border-bottom: 3px solid #e63946;
            padding: 12px 0;
        }
        .post-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            transition: transform 0.2s, box-shadow 0.2s;
            background: #fff;
            margin-bottom: 1.5rem;
        }
        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .post-card .card-body {
            padding: 1.5rem;
        }
        .post-title a {
            color: #1a1a2e;
            font-family: 'Merriweather', serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
        }
        .post-title a:hover {
            color: #e63946;
        }
        .post-meta {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }
        .post-excerpt {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .btn-read-more {
            background-color: #e63946;
            border: none;
            color: #fff;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-read-more:hover {
            background-color: #c1121f;
            color: #fff;
        }
        .category-badge {
            background-color: #e63946;
            color: white;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 8px;
            display: inline-block;
        }
        .section-title {
            font-family: 'Merriweather', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            border-left: 4px solid #e63946;
            padding-left: 12px;
            margin-bottom: 1.5rem;
        }
        footer {
            background-color: #1a1a2e;
            color: #aaa;
            padding: 30px 0;
            margin-top: 60px;
            text-align: center;
        }
        footer a {
            color: #e63946;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">OpremBlog</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Categories
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/">All Posts</a></li>
                            <li><hr class="dropdown-divider"></li>
                            {% for category in categories %}
                                <li>
                                    <a class="dropdown-item" href="/?category={{ category.slug }}">
                                        {{ category.name }}
                                    </a>
                                </li>
                            {% empty %}
                                <li><span class="dropdown-item text-muted">No categories yet</span></li>
                            {% endfor %}
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about/">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact/">Contact</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-2">
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-1">© 2026 <a href="/">OpremBlog</a> — All rights reserved</p>
            <p class="mb-0 small">Built by OPREM</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
